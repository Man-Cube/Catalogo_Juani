<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autoservicio Juani - Catálogo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00388c">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        body { background-color: #f0f4f8; -webkit-tap-highlight-color: transparent; }
        .bg-juani-blue { background-color: #00388c; }
        .text-juani-blue { color: #00388c; }
        .bg-juani-red { background-color: #e53935; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUpModal 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-out; }
        .flying-item { position: fixed; z-index: 9999; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.2); opacity: 1; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="text-gray-800 font-sans antialiased select-none pb-10">

    <div id="toast-stock" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-white px-5 py-2.5 rounded-full font-bold shadow-lg z-[100] transition-opacity duration-300 opacity-0 pointer-events-none text-sm text-center w-[90%] max-w-sm">
        ¡Doña! Solo nos quedan X unidades.
    </div>

    <button onclick="abrirPantallaCarrito()" id="btn-carrito-flotante" class="fixed top-4 right-4 z-[60] active:scale-95 transition-transform p-3">
        <span class="text-3xl">🛒</span>
