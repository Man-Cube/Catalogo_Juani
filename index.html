<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autoservicio Juani - Catálogo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00388c">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        body { background-color: #f0f4f8; -webkit-tap-highlight-color: transparent; }
        .bg-juani-blue { background-color: #00388c; }
        .text-juani-blue { color: #00388c; }
        .bg-juani-red { background-color: #e53935; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUpModal 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-out; }

        .flying-item {
            position: fixed;
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 1;
        }
    </style>
</head>
<body class="text-gray-800 font-sans antialiased select-none pb-10">

    <button onclick="abrirPantallaCarrito()" id="btn-carrito-flotante" class="fixed top-4 right-4 z-[60] active:scale-95 transition-transform p-3">
        <span class="text-3xl">🛒</span>
        <span id="badge-carrito" class="absolute -top-1 -right-1 bg-juani-red text-white text-[11px] font-bold w-6 h-6 flex items-center justify-center rounded-full shadow-md transform transition-transform hidden border-2 border-white/50">0</span>
    </button>

    <div id="pantalla-catalogo" class="block">
        <header class="bg-juani-blue sticky top-0 z-50 rounded-b-3xl shadow-lg pb-4">
            <div class="flex flex-col items-center pt-4 pb-2">
                <div class="flex items-center gap-2 pr-12">
                    <span class="text-3xl">🏪</span>
                    <div class="flex flex-col">
                        <h1 class="text-white text-xl font-extrabold leading-tight tracking-wide">Autoservicio Juani</h1>
                        <span class="text-blue-200 text-[10px] font-semibold uppercase tracking-widest text-center">- Tu Súper de Barrio -</span>
                    </div>
                </div>
            </div>

            <div class="px-4 mt-2">
                <div class="bg-white rounded-full flex items-center px-4 py-2.5 shadow-inner">
                    <span class="text-gray-400 text-lg mr-2">🔍</span>
                    <input type="text" id="buscador-cliente" oninput="filtrarCatalogo()" placeholder="¿Qué buscás hoy, doña?" class="w-full bg-transparent outline-none text-sm text-gray-700 font-medium placeholder-gray-400">
                </div>
            </div>

            <div class="flex gap-4 overflow-x-auto hide-scroll px-4 mt-5 pb-1" id="barra-categorias">
                <button onclick="seleccionarCategoria('TODOS')" id="cat-TODOS" class="flex flex-col items-center gap-1 shrink-0 scale-105 transition-all opacity-100">
                    <div class="w-12 h-12 bg-juani-red rounded-full flex items-center justify-center text-xl shadow-md border-2 border-white ring-2 ring-red-400">✨</div>
                    <span class="text-white text-[10px] font-bold">Todos</span>
                </button>
                <button onclick="seleccionarCategoria('Almacen')" id="cat-Almacen" class="flex flex-col items-center gap-1 shrink-0 opacity-70 transition-all">
                    <div class="w-12 h-12 bg-blue-800 rounded-full flex items-center justify-center text-xl shadow-inner border border-blue-700">🥫</div>
                    <span class="text-blue-100 text-[10px] font-medium">Almacén</span>
                </button>
                <button onclick="seleccionarCategoria('Bebidas')" id="cat-Bebidas" class="flex flex-col items-center gap-1 shrink-0 opacity-70 transition-all">
                    <div class="w-12 h-12 bg-blue-800 rounded-full flex items-center justify-center text-xl shadow-inner border border-blue-700">🥤</div>
                    <span class="text-blue-100 text-[10px] font-medium">Bebidas</span>
                </button>
                <button onclick="seleccionarCategoria('Fiambreria')" id="cat-Fiambreria" class="flex flex-col items-center gap-1 shrink-0 opacity-70 transition-all">
                    <div class="w-12 h-12 bg-blue-800 rounded-full flex items-center justify-center text-xl shadow-inner border border-blue-700">🧀</div>
                    <span class="text-blue-100 text-[10px] font-medium">Fiambrería</span>
                </button>
                <button onclick="seleccionarCategoria('Limpieza')" id="cat-Limpieza" class="flex flex-col items-center gap-1 shrink-0 opacity-70 transition-all">
                    <div class="w-12 h-12 bg-blue-800 rounded-full flex items-center justify-center text-xl shadow-inner border border-blue-700">🧹</div>
                    <span class="text-blue-100 text-[10px] font-medium">Limpieza</span>
                </button>
            </div>
        </header>

        <div id="loading-catalogo" class="p-10 text-center text-xs font-bold text-gray-400 flex flex-col items-center gap-2">
            <span class="text-3xl animate-spin">⏳</span> Cargando las ofertas del día...
        </div>

        <main class="p-4 grid grid-cols-2 gap-3 max-w-md mx-auto w-full hidden" id="contenedor-productos"></main>
    </div>

    <div id="pantalla-carrito" class="hidden min-h-screen bg-white max-w-md mx-auto relative pb-32">
        <div class="bg-white sticky top-0 z-40 px-4 py-4 border-b border-gray-100 flex items-center shadow-sm">
            <button onclick="cerrarPantallaCarrito()" class="text-juani-blue p-2 bg-blue-50 rounded-full font-bold active:scale-95">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <h2 class="text-xl font-extrabold text-gray-800 ml-4 flex-1">Tu Changuito</h2>
            <button onclick="vaciarCarrito()" class="text-red-500 text-sm font-bold bg-red-50 px-3 py-1 rounded-lg">Vaciar</button>
        </div>

        <div id="lista-carrito-checkout" class="p-4 flex flex-col gap-4"></div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50 max-w-md mx-auto pb-safe">
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-500 font-semibold">Total a pagar:</span>
                <span class="text-2xl font-black text-juani-blue" id="checkout-total">$0,00</span>
            </div>
            <button id="btn-confirmar-pedido" onclick="dispararPedidoWhatsApp()" class="w-full bg-juani-red text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2 text-base uppercase tracking-widest">
                <span class="text-xl">💬</span> Confirmar Pedido
            </button>
        </div>
    </div>

    <div id="modal-producto" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[70] flex flex-col justify-end transition-opacity">
        <div class="bg-white rounded-t-3xl w-full max-w-md mx-auto flex flex-col relative animate-slide-up overflow-hidden pb-safe">
            <button onclick="cerrarModalProducto()" class="absolute top-4 right-4 bg-white/80 backdrop-blur text-gray-800 p-2 rounded-full z-10 shadow-sm border border-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="overflow-y-auto max-h-[70vh]">
                <div id="modal-img-container" class="w-full h-56 bg-gray-50 flex items-center justify-center p-4 border-b border-gray-100 relative"></div>
                <div class="p-5">
                    <h2 id="modal-titulo" class="text-xl font-black text-gray-800 leading-tight mb-1 uppercase"></h2>
                    <p id="modal-precio-unitario" class="text-gray-400 text-xs font-semibold mb-2"></p>
                    <p id="modal-desc" class="text-sm text-gray-600 leading-relaxed bg-blue-50 p-3 rounded-xl border border-blue-100"></p>
                </div>
            </div>
            <div class="bg-white border-t border-gray-100 p-5 flex flex-col gap-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                <div class="flex items-center justify-center gap-6">
                    <span class="text-sm font-bold text-gray-400">Unidades:</span>
                    <div class="flex items-center bg-gray-50 rounded-2xl border border-gray-200 p-1">
                        <button onclick="ajustarTempCant(-1)" class="w-12 h-12 rounded-xl bg-white text-juani-blue shadow-sm flex items-center justify-center text-2xl font-black active:scale-95">-</button>
                        <span id="modal-temp-cant" class="font-black text-gray-800 text-xl w-14 text-center">1</span>
                        <button onclick="ajustarTempCant(1)" class="w-12 h-12 rounded-xl bg-juani-blue text-white shadow-sm flex items-center justify-center text-2xl font-black active:scale-95">+</button>
                    </div>
                </div>
                <button id="btn-confirmar-modal" onclick="confirmarAgregadoAlChango()" class="w-full bg-juani-red text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-between px-6 text-sm uppercase tracking-wide">
                    <span>Agregar al changuito</span>
                    <span id="modal-subtotal" class="font-black text-lg bg-white/20 px-3 py-1 rounded-lg"></span>
                </button>
            </div>
        </div>
    </div>

    <div id="modal-aviso-precio" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[80] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-3xl w-full max-sm mx-auto flex flex-col items-center p-6 text-center animate-pop shadow-2xl">
            <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center text-3xl mb-4 border-4 border-white shadow-sm">⚠️</div>
            <h2 class="text-xl font-black text-gray-800 mb-2 leading-tight">Precios Actualizados</h2>
            <p class="text-sm text-gray-500 mb-6 leading-relaxed">Doña, algunos productos cambiaron de precio en el local mientras armaba el changuito. Le actualizamos el total para que lo revise.</p>
            <button onclick="cerrarAvisoPrecio()" class="w-full bg-juani-blue text-white font-black py-3.5 rounded-xl shadow-md active:scale-95 transition-transform uppercase tracking-wide text-sm">
                Entendido
            </button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(e => {}); }); }

        const URL_CSV_PLANILLA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6vRsDn1Xlsgb0Phw2y26b9ZSWM7ZfYf933MyKKm5Yncxihx90-vqhCHI2OukHoEVWcb2T4Wpi0RsX/pub?output=csv";
        
        let BD_PRODUCTOS = [];
        let categoriaSeleccionada = "TODOS";
        let productoAbierto = null;
        let cantTemporalModal = 1;

        async function inicializarCatalogo() {
            try {
                const respuesta = await fetch(URL_CSV_PLANILLA);
                const textoCSV = await respuesta.text();
                
                Papa.parse(textoCSV, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        BD_PRODUCTOS = results.data.map((item, index) => ({
                            id: index,
                            codigo: item.codigo ? item.codigo.trim() : '',
                            nombre: item.nombre ? item.nombre.trim() : 'Sin nombre',
                            categoria: item.categoria ? item.categoria.trim() : 'Otros',
                            precio: item.precio ? parseFloat(item.precio.replace(/[^0-9.-]+/g,"")) : 0,
                            imagen: item.imagen ? item.imagen.trim() : '',
                            descripcion: item.descripcion ? item.descripcion.trim() : 'Sin descripción adicional.',
                            cantidad: 0
                        }));
                        document.getElementById('loading-catalogo').classList.add('hidden');
                        document.getElementById('contenedor-productos').classList.remove('hidden');
                        renderizarCatalogo();
                    }
                });
            } catch (error) { document.getElementById('loading-catalogo').innerText = "❌ Error al cargar."; }
        }

        function renderizarCatalogo() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            const busqueda = document.getElementById('buscador-cliente').value.toLowerCase();

            const productosFiltrados = BD_PRODUCTOS.filter(p => {
                const coincideCat = (categoriaSeleccionada === "TODOS" || p.categoria.toLowerCase() === categoriaSeleccionada.toLowerCase());
                const coincideBusqueda = p.nombre.toLowerCase().includes(busqueda) || p.codigo.includes(busqueda);
                return coincideCat && coincideBusqueda;
            });

            if(productosFiltrados.length === 0) {
                contenedor.className = "p-4 flex flex-col max-w-md mx-auto w-full";
                contenedor.innerHTML = `<p class="text-center text-gray-400 text-xs mt-10">No encontramos productos.</p>`;
                return;
            }

            contenedor.className = "p-4 grid grid-cols-2 gap-3 max-w-md mx-auto w-full";

            productosFiltrados.forEach((prod) => {
                const elementoImagen = prod.imagen ? 
                    `<img src="${prod.imagen}" class="w-full h-full object-contain mix-blend-multiply">` :
                    `<div class="text-4xl text-gray-300">📦</div>`;

                contenedor.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-2 flex flex-col relative animate-fade-in h-full cursor-pointer" onclick="abrirModalProducto(${prod.id})">
                    <div class="w-full aspect-square bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-center mb-2 p-2 relative overflow-hidden shrink-0">
                        ${elementoImagen}
                        ${prod.cantidad > 0 ? `<div class="absolute top-1 right-1 bg-juani-blue text-white text-[11px] font-bold w-6 h-6 flex items-center justify-center rounded-full shadow-md border border-white">${prod.cantidad}</div>` : ''}
                    </div>
                    <div class="flex flex-col flex-1">
                        <h3 class="text-[11px] leading-tight font-bold text-gray-800 line-clamp-2 min-h-[28px] mb-1">${prod.nombre.toUpperCase()}</h3>
                        <p class="text-[15px] font-extrabold text-juani-blue mt-auto">$${prod.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</p>
                    </div>
                    <div class="mt-2 bg-gray-50 rounded-full py-1.5 text-center text-[10px] font-bold text-gray-500 border border-gray-200">
                        ${prod.cantidad > 0 ? `MODIFICAR` : `AGREGAR +`}
                    </div>
                </div>`;
            });
            actualizarIconoCarritoFlotante();
        }

        function seleccionarCategoria(cat) {
            categoriaSeleccionada = cat;
            const botones = document.getElementById('barra-categorias').getElementsByTagName('button');
            for (let btn of botones) {
                if(btn.id === `cat-${cat}`) { btn.classList.remove('opacity-70'); btn.classList.add('scale-105', 'opacity-100'); } 
                else { btn.classList.remove('scale-105', 'opacity-100'); btn.classList.add('opacity-70'); }
            }
            renderizarCatalogo();
        }

        function filtrarCatalogo() { renderizarCatalogo(); }

        // ====== LÓGICA DEL MODAL ======
        function abrirModalProducto(id) {
            productoAbierto = BD_PRODUCTOS.find(p => p.id === id);
            if(!productoAbierto) return;

            cantTemporalModal = productoAbierto.cantidad > 0 ? productoAbierto.cantidad : 1;

            document.getElementById('modal-titulo').innerText = productoAbierto.nombre;
            document.getElementById('modal-precio-unitario').innerText = `Precio por unidad: $${productoAbierto.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}`;
            document.getElementById('modal-desc').innerText = productoAbierto.descripcion;
            
            document.getElementById('modal-img-container').innerHTML = productoAbierto.imagen ? 
                `<img id="img-vuelo-origen" src="${productoAbierto.imagen}" class="w-full h-full object-contain mix-blend-multiply">` :
                `<div id="img-vuelo-origen" class="text-7xl text-gray-300">📦</div>`;

            actualizarVistaTemporalModal();
            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function cerrarModalProducto() {
            document.getElementById('modal-producto').classList.add('hidden');
            productoAbierto = null;
        }

        function ajustarTempCant(cambio) {
            const nueva = cantTemporalModal + cambio;
            if(nueva >= 1 && nueva <= 99) { 
                cantTemporalModal = nueva;
                actualizarVistaTemporalModal();
            } else if (nueva === 0 && productoAbierto.cantidad > 0) {
                cantTemporalModal = 0;
                actualizarVistaTemporalModal();
                document.getElementById('btn-confirmar-modal').innerHTML = `<span>Quitar del changuito</span><span class="text-xl">🗑️</span>`;
            }
        }

        function actualizarVistaTemporalModal() {
            document.getElementById('modal-temp-cant').innerText = cantTemporalModal;
            const sub = cantTemporalModal * productoAbierto.precio;
            const btnConfirmar = document.getElementById('btn-confirmar-modal');
            
            if(cantTemporalModal > 0) {
                btnConfirmar.innerHTML = `<span>Agregar al changuito</span><span class="font-black text-lg bg-white/20 px-3 py-1 rounded-lg">$${sub.toLocaleString('es-AR', {minimumFractionDigits: 2})}</span>`;
            }
        }

        function confirmarAgregadoAlChango() {
            productoAbierto.cantidad = cantTemporalModal;
            if(cantTemporalModal > 0) { volarAlCarrito(); }
            cerrarModalProducto();
            renderizarCatalogo();
        }

        // ====== ANIMACIÓN ======
        function volarAlCarrito() {
            const imgOrigen = document.getElementById('img-vuelo-origen');
            const iconDestino = document.getElementById('btn-carrito-flotante');
            
            if(!imgOrigen || !iconDestino) return;

            const rectOrigen = imgOrigen.getBoundingClientRect();
            const rectDestino = iconDestino.getBoundingClientRect();
            const clon = imgOrigen.cloneNode(true);
            clon.classList.add('flying-item');
            
            if(clon.tagName === 'DIV') {
                clon.style.width = rectOrigen.width + 'px';
                clon.style.height = rectOrigen.height + 'px';
                clon.style.display = 'flex';
                clon.style.alignItems = 'center';
                clon.style.justifyContent = 'center';
                clon.style.backgroundColor = 'white';
            }

            clon.style.top = rectOrigen.top + 'px';
            clon.style.left = rectOrigen.left + 'px';
            clon.style.width = rectOrigen.width + 'px';
            clon.style.height = rectOrigen.height + 'px';

            document.body.appendChild(clon);
            void clon.offsetWidth; 

            clon.style.top = (rectDestino.top + (rectDestino.height / 2) - 10) + 'px';
            clon.style.left = (rectDestino.left + (rectDestino.width / 2) - 10) + 'px';
            clon.style.width = '20px';
            clon.style.height = '20px';
            clon.style.opacity = '0.2';

            setTimeout(() => {
                clon.remove();
                iconDestino.classList.add('animate-pop');
                setTimeout(() => iconDestino.classList.remove('animate-pop'), 300);
                actualizarIconoCarritoFlotante();
            }, 600);
        }

        // ====== CHANGUITO Y CHECKOUT ======
        function actualizarIconoCarritoFlotante() {
            let totalUnidades = 0;
            BD_PRODUCTOS.forEach(p => totalUnidades += p.cantidad);
            const badge = document.getElementById('badge-carrito');
            if(totalUnidades > 0) {
                badge.innerText = totalUnidades;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function abrirPantallaCarrito() {
            document.getElementById('pantalla-catalogo').classList.add('hidden');
            document.getElementById('btn-carrito-flotante').classList.add('hidden');
            document.getElementById('pantalla-carrito').classList.remove('hidden');
            renderizarListaCheckout();
            window.scrollTo(0,0);
        }

        function cerrarPantallaCarrito() {
            document.getElementById('pantalla-carrito').classList.add('hidden');
            document.getElementById('pantalla-catalogo').classList.remove('hidden');
            document.getElementById('btn-carrito-flotante').classList.remove('hidden');
            renderizarCatalogo();
        }

        function vaciarCarrito() {
            if(confirm("¿Seguro que querés vaciar todo el changuito, doña?")) {
                BD_PRODUCTOS.forEach(p => p.cantidad = 0);
                renderizarListaCheckout();
                actualizarIconoCarritoFlotante();
            }
        }

        function renderizarListaCheckout() {
            const divCarrito = document.getElementById('lista-carrito-checkout');
            const carrito = BD_PRODUCTOS.filter(p => p.cantidad > 0);
            let granTotal = 0;
            divCarrito.innerHTML = '';

            if(carrito.length === 0) {
                divCarrito.innerHTML = `
                <div class="text-center py-20">
                    <span class="text-6xl mb-4 block">🛒</span>
                    <h3 class="text-gray-500 font-bold text-lg">El changuito está vacío</h3>
                    <p class="text-gray-400 text-sm mt-2 mb-6">Aprovechá las ofertas de hoy.</p>
                    <button onclick="cerrarPantallaCarrito()" class="bg-blue-50 text-juani-blue font-bold px-6 py-3 rounded-xl border border-blue-100">Volver a comprar</button>
                </div>`;
                document.getElementById('checkout-total').innerText = "$0,00";
                return;
            }

            carrito.forEach(prod => {
                let sub = prod.precio * prod.cantidad;
                granTotal += sub;
                const elementoImagen = prod.imagen ? 
                    `<img src="${prod.imagen}" class="w-full h-full object-contain mix-blend-multiply">` :
                    `<div class="text-xl text-gray-300">📦</div>`;

                divCarrito.innerHTML += `
                <div class="bg-white border border-gray-100 rounded-2xl p-3 flex items-center gap-3 shadow-sm">
                    <div class="w-16 h-16 bg-gray-50 rounded-xl flex items-center justify-center p-1 shrink-0 border border-gray-50">
                        ${elementoImagen}
                    </div>
                    <div class="flex-1">
                        <h4 class="text-xs font-bold text-gray-800 leading-tight uppercase line-clamp-2">${prod.nombre}</h4>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-sm font-black text-juani-blue">$${sub.toLocaleString('es-AR', {minimumFractionDigits: 2})}</span>
                            <div class="flex items-center bg-gray-50 rounded-lg border border-gray-200 p-0.5">
                                <button onclick="modificarEnCheckout(${prod.id}, -1)" class="w-7 h-7 rounded-md bg-white text-gray-600 shadow-sm flex items-center justify-center font-bold">-</button>
                                <span class="font-bold text-gray-800 text-xs w-6 text-center">${prod.cantidad}</span>
                                <button onclick="modificarEnCheckout(${prod.id}, 1)" class="w-7 h-7 rounded-md bg-white text-gray-600 shadow-sm flex items-center justify-center font-bold">+</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('checkout-total').innerText = `$${granTotal.toLocaleString('es-AR', {minimumFractionDigits: 2})}`;
        }

        function modificarEnCheckout(id, cambio) {
            const index = BD_PRODUCTOS.findIndex(p => p.id === id);
            if(index !== -1) {
                const nuevaCant = BD_PRODUCTOS[index].cantidad + cambio;
                if(nuevaCant >= 0 && nuevaCant <= 99) {
                    BD_PRODUCTOS[index].cantidad = nuevaCant;
                    renderizarListaCheckout(); 
                    actualizarIconoCarritoFlotante();
                }
            }
        }

        // ====== SEGURIDAD Y WHASTAPP (VALIDACIÓN PURGADA) ======
        // ====== SEGURIDAD Y WHASTAPP (VERSIÓN GOOGLE SHEETS BLINDADA) ======
        async function dispararPedidoWhatsApp() {
            const carrito = BD_PRODUCTOS.filter(p => p.cantidad > 0);
            if(carrito.length === 0) return;

            const btn = document.getElementById('btn-confirmar-pedido');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = `<span class="animate-spin text-xl inline-block mr-2">⏳</span> Verificando precios...`;
            btn.disabled = true;

            try {
                // Le pedimos a Google Sheets el archivo más fresco, saltando la memoria caché
                const urlFresca = URL_CSV_PLANILLA + "&t=" + new Date().getTime();
                const respuesta = await fetch(urlFresca);
                const textoCSV = await respuesta.text();
                let huboCambios = false;

                Papa.parse(textoCSV, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        const datosFrescos = results.data;
                        
                        carrito.forEach(itemChango => {
                            // Buscamos el código exacto, afeitando espacios por las dudas
                            const itemFresco = datosFrescos.find(f => String(f.codigo).trim() === String(itemChango.codigo).trim());
                            
                            if(itemFresco && itemFresco.precio) {
                                // MAGIA PARA PESOS ARGENTINOS: Limpiamos los puntos y comas
                                let strPrecio = String(itemFresco.precio).replace(/\$|\s/g, ''); // Saca el $ y espacios
                                strPrecio = strPrecio.replace(/\./g, ''); // Saca los puntos de mil (1.500 -> 1500)
                                strPrecio = strPrecio.replace(/,/g, '.'); // Cambia coma por punto decimal (1500,50 -> 1500.50)
                                
                                const precioFresco = parseFloat(strPrecio);
                                
                                // Si el precio es válido y distinto al del changuito, lo actualiza
                                if(!isNaN(precioFresco) && precioFresco !== itemChango.precio) {
                                    itemChango.precio = precioFresco;
                                    huboCambios = true;
                                }
                            }
                        });

                        btn.innerHTML = textoOriginal;
                        btn.disabled = false;

                        if(huboCambios) {
                            // Si cambió, actualiza la pantalla y muestra el cartel
                            renderizarListaCheckout(); 
                            actualizarIndicadoresCarrito();
                            document.getElementById('modal-aviso-precio').classList.remove('hidden');
                        } else {
                            // Si está todo OK, manda el WhatsApp
                            enviarWhatsAppFinal(carrito);
                        }
                    }
                });
            } catch (error) {
                // Si la doña se quedó sin internet justo ahí, mandamos igual para asegurar la venta
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
                enviarWhatsAppFinal(carrito);
            }
        }
                btn.innerHTML = textoOriginal;
                btn.disabled = false;

                if(huboCambios) {
                    // SE ELIMINÓ LA FUNCIÓN INEXISTENTE QUE HACÍA FALLAR EL MODAL
                    renderizarListaCheckout(); 
                    document.getElementById('modal-aviso-precio').classList.remove('hidden');
                } else {
                    enviarWhatsAppFinal(carrito);
                }
            } catch (error) {
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
                enviarWhatsAppFinal(carrito);
            }
        }

        function cerrarAvisoPrecio() {
            document.getElementById('modal-aviso-precio').classList.add('hidden');
        }

        function enviarWhatsAppFinal(carrito) {
            let mensaje = `👋 *Hola Autoservicio Juani!* Quiero realizar el siguiente pedido:\n\n`;
            let granTotal = 0;
            carrito.forEach(item => {
                let sub = item.precio * item.cantidad; granTotal += sub;
                mensaje += `📦 *${item.nombre.toUpperCase()}*\n   ${item.cantidad} x $${item.precio.toLocaleString('es-AR')} = *$${sub.toLocaleString('es-AR')}*\n\n`;
            });
            mensaje += `Total estimado a pagar: *$${granTotal.toLocaleString('es-AR')}*\n\n¿Me confirmarían si tienen stock? ¡Gracias!`;
            
            const NUMERO_TELEFONO_JUANI = "5491154841973"; 
            window.open(`https://wa.me/${NUMERO_TELEFONO_JUANI}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        inicializarCatalogo();
    </script>
